models:
  families:
    - xgboost
    - xgboost_depth9
    - catboost
  family_seeds:
    xgboost:
      - 100
    xgboost_depth9:
      - 100
      - 314
      - 2718
    catboost:
      - 2026
  params:
    lightgbm:
      n_estimators: 1800
    xgboost:
      n_estimators: 1800
    xgboost_depth9:
      n_estimators: 2600
      learning_rate: 0.025
      max_depth: 9
    catboost:
      iterations: 1800

analysis:
  enabled: true
  ablation:
    enabled: false
  permutation_importance:
    enabled: true
    max_rows_per_fold: 3000
    n_repeats: 1
    recommended_drop_delta_threshold: 0.0
    recommended_drop_positive_fold_rate: 0.6

objectives:
  - name: mae
    params:
      lightgbm:
        objective: mae
        metric: mae
      xgboost:
        objective: reg:absoluteerror
      catboost:
        loss_function: MAE

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/hydra/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

target: avg_delay_minutes_next_30m
id_cols:
  - ID
  - layout_id
  - scenario_id

model_seed: 42
model_seeds:
  - 42
  - 2026
  - 777

cv:
  n_splits: 5
  seed: 42

run:
  date: ${now:%Y-%m-%d}
  timestamp: ${now:%Y-%m-%d-%H-%M-%S}
  id: ${run.timestamp}

data:
  dir: data
  train: train.csv
  test: test.csv
  layout: layout_info.csv
  sample_submission: sample_submission.csv

output:
  dir: outputs/${run.id}
  submission: submission.csv
  oof: oof_train.csv
  report: cv_report_train.json
  log: train.log

features:
  drop_cols: []
  drop_groups: []
  lag_rolling_cols:
    - order_inflow_15m
    - congestion_score
    - battery_mean
    - low_battery_ratio
    - robot_idle
    - robot_charging
    - charge_queue_length
    - max_zone_density

models:
  families:
    - lightgbm
    - xgboost
    # - catboost
  params:
    lightgbm:
      n_estimators: 1800
    xgboost:
      n_estimators: 1800
    catboost:
      iterations: 1800

analysis:
  enabled: true
  ablation:
    enabled: true
  permutation_importance:
    enabled: true
    max_rows_per_fold: 5000
    n_repeats: 2
    recommended_drop_delta_threshold: 0.0
    recommended_drop_positive_fold_rate: 0.6

objectives:
  - name: mae
    params:
      lightgbm:
        objective: mae
        metric: mae
      xgboost:
        objective: reg:absoluteerror
      catboost:
        loss_function: MAE

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/hydra/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
